# OpenClash 分流模板（最终稳定版）
# version: 2026-03-19-final-checked

[custom]
; ===== 策略组（主功能区） =====

# 🚀 主策略：全局默认出口，未匹配流量最终走这里
custom_proxy_group=🚀 主策略`select`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点`[]DIRECT

# 🤖 OpenAI：仅 OpenAI（ChatGPT / API），默认固定走 S2 节点避免风控
custom_proxy_group=🤖 OpenAI`select`[]🧩 S2节点`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]DIRECT

# 🧠 AI服务：除 OpenAI 外的 AI（Gemini / Claude / Perplexity 等）
custom_proxy_group=🧠 AI服务`select`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点`[]DIRECT

# 💻 微软服务：Bing / Copilot / GitHub 等
custom_proxy_group=💻 微软服务`select`[]🚀 主策略`[]DIRECT`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点

# 🌐 Google：Google 搜索 / Gmail / Drive / Maps / Play 等
custom_proxy_group=🌐 Google`select`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点`[]DIRECT

# 💬 即时通讯：Telegram 为主，后续可扩 WhatsApp / Signal
custom_proxy_group=💬 即时通讯`select`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点`[]DIRECT

# 🎞️ 流媒体：Netflix / Disney+ / YouTube 等视频服务
custom_proxy_group=🎞️ 流媒体`select`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点`[]DIRECT

# 🍎 苹果服务：默认直连，需要美区时手动切代理
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点

# 🏦 香港服务：香港金融和常用网站，默认直连，需要时可切代理
custom_proxy_group=🏦 香港服务`select`[]DIRECT`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点

# 🏠 国内服务：国内站点直连，避免误走代理
custom_proxy_group=🏠 国内服务`select`[]DIRECT`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点

# 🌍 直连策略：GEOIP CN 兜底直连
custom_proxy_group=🌍 直连策略`select`[]DIRECT`[]🚀 主策略`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点

# 🧩 默认兜底：所有未匹配流量最终走这里
custom_proxy_group=🧩 默认兜底`select`[]🚀 主策略`[]DIRECT`[]⚡ 自动测速`[]☁️ CF节点`[]🧩 S2节点


; ===== 节点区（放最下面） =====

# ⚡ 自动测速：每300秒测速，延迟差≥50ms才切换（稳定优先）
custom_proxy_group=⚡ 自动测速`url-test`.*`http://www.gstatic.com/generate_204`300,50,50

# ☁️ CF节点：Cloudflare 相关节点集合
custom_proxy_group=☁️ CF节点`select`(^CF|^cf)

# 🧩 S2节点：你的自定义节点池
custom_proxy_group=🧩 S2节点`select`(^S2|^s2)


; ===== 规则（按优先级，从上到下） =====

; --- OpenAI：你自建规则 ---
ruleset=🤖 OpenAI,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/openai.list

; --- AI服务：你自建规则 ---
ruleset=🧠 AI服务,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/ai.list

; --- 微软服务：ACL4SSR 稳定源 ---
ruleset=💻 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list

; --- Google：不用失效的 Google.list，改为内联规则，避免404 ---
ruleset=🌐 Google,[]DOMAIN-SUFFIX,google.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,google.com.hk
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googleapis.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,gstatic.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,gmail.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googlemail.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googledrive.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googleusercontent.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,ggpht.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,recaptcha.net
ruleset=🌐 Google,[]DOMAIN-SUFFIX,chrome.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,chromium.org
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googletagmanager.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googleadservices.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googlesyndication.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,google-analytics.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googletraveladservices.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,withgoogle.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,googlesource.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,appspot.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,gvt1.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,gvt2.com
ruleset=🌐 Google,[]DOMAIN-SUFFIX,gvt3.com

; --- 即时通讯：ACL4SSR 稳定源 ---
ruleset=💬 即时通讯,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list

; --- 流媒体：ACL4SSR 稳定源 ---
ruleset=🎞️ 流媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list

; --- 苹果服务：ACL4SSR 稳定源 ---
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

; --- 香港服务：你自建规则，默认直连 ---
ruleset=🏦 香港服务,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/hk.list

; --- 国内服务：ACL4SSR 稳定源 ---
ruleset=🏠 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🏠 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list

; --- 中国兜底直连 ---
ruleset=🌍 直连策略,[]GEOIP,CN

; --- 最终兜底 ---
ruleset=🧩 默认兜底,[]FINAL


; ===== 基础设置 =====
enable_rule_generator=true
overwrite_original_rules=true
