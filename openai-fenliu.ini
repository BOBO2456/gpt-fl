[custom]
;==================================================
; ACL4SSR 标准版自定义分组 - 稳定可用版
; 说明：
; 1. 自动选择 = 全部节点中自动测速选最快
; 2. lucky = 匹配所有以 lucky 开头的节点，并自动选最快
; 3. s2 = 匹配所有以 s2 开头的节点，并自动选最快
; 4. 其他 = 兜底分组（当前先用全部节点兜底，保证模板可生效）
;==================================================

;------------------------------
; 规则集
;------------------------------
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/LocalAreaNetwork.list
ruleset=🛑 全球拦截,rules/ACL4SSR/Clash/BanAD.list
ruleset=🍃 应用净化,rules/ACL4SSR/Clash/BanProgramAD.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/GoogleCN.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/Ruleset/SteamCN.list
ruleset=Ⓜ️ 微软服务,rules/ACL4SSR/Clash/Microsoft.list
ruleset=🍎 苹果服务,rules/ACL4SSR/Clash/Apple.list
ruleset=🌍 国外媒体,rules/ACL4SSR/Clash/ProxyMedia.list
ruleset=📲 电报信息,rules/ACL4SSR/Clash/Telegram.list
ruleset=🚀 节点选择,rules/ACL4SSR/Clash/ProxyLite.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/ChinaDomain.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

;------------------------------
; 自动选择：全部节点里选最快
;------------------------------
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;------------------------------
; lucky / s2 集合
; 仅匹配节点名前缀
;------------------------------
custom_proxy_group=lucky`url-test`(?i)^lucky.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=s2`url-test`(?i)^s2.*`http://www.gstatic.com/generate_204`300,,50

;------------------------------
; 其他
; 先用稳定兜底写法，避免模板失效
; 这组当前会包含全部节点，但界面层面不会再把单节点铺出来
;------------------------------
custom_proxy_group=其他`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;------------------------------
; 业务分组
; 这里只引用固定分组，不直接引用单节点
;------------------------------
custom_proxy_group=🚀 节点选择`select`[]自动选择`[]DIRECT`[]lucky`[]s2`[]其他
custom_proxy_group=🌍 国外媒体`select`[]自动选择`[]lucky`[]s2`[]其他`[]🎯 全球直连
custom_proxy_group=📲 电报信息`select`[]自动选择`[]lucky`[]s2`[]其他`[]🎯 全球直连
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]自动选择`[]lucky`[]s2`[]其他
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]自动选择`[]lucky`[]s2`[]其他
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]自动选择`[]lucky`[]s2`[]其他`[]🎯 全球直连

enable_rule_generator=true
overwrite_original_rules=true
