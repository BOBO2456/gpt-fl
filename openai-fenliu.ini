[custom]
;==================================================
; ACL4SSR Ultimate Custom Template
; Lucky节点 / S2UNO节点 架构
;==================================================


;------------------------------
; 规则集
;------------------------------

ruleset=🎯 全球直连,rules/ACL4SSR/Clash/LocalAreaNetwork.list
ruleset=🛑 全球拦截,rules/ACL4SSR/Clash/BanAD.list
ruleset=🍃 应用净化,rules/ACL4SSR/Clash/BanProgramAD.list

ruleset=🎯 全球直连,rules/ACL4SSR/Clash/GoogleCN.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/Ruleset/SteamCN.list

ruleset=🤖 OpenAI,rules/ACL4SSR/Clash/Ruleset/OpenAi.list
ruleset=🧠 AI服务,rules/ACL4SSR/Clash/Ruleset/OpenAi.list

ruleset=🛠 开发服务,rules/ACL4SSR/Clash/Ruleset/Github.list

ruleset=Ⓜ️ 微软服务,rules/ACL4SSR/Clash/Microsoft.list
ruleset=🍎 苹果服务,rules/ACL4SSR/Clash/Apple.list

ruleset=🌍 国外媒体,rules/ACL4SSR/Clash/ProxyMedia.list
ruleset=📲 电报信息,rules/ACL4SSR/Clash/Telegram.list

ruleset=🌐 国际服务,rules/ACL4SSR/Clash/ProxyLite.list

ruleset=🚀 节点选择,rules/ACL4SSR/Clash/ProxyLite.list

ruleset=🎯 全球直连,rules/ACL4SSR/Clash/ChinaDomain.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN

ruleset=🐟 漏网之鱼,[]FINAL



;------------------------------
; 自动测速
;------------------------------

custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50



;------------------------------
; 节点集合
;------------------------------

custom_proxy_group=🍀 Lucky节点`url-test`(?i)^lucky.*`https://cp.cloudflare.com/generate_204`300,,50

custom_proxy_group=🛰️ S2UNO节点`url-test`(?i)^s2.*`https://cp.cloudflare.com/generate_204`300,,50



;------------------------------
; 其他节点
;------------------------------

custom_proxy_group=📦 其他节点`url-test`^(?!.*(lucky|s2)).*`https://cp.cloudflare.com/generate_204`300,,50



;==================================================
; 策略组
;==================================================


custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`[]🍀 Lucky节点`[]🛰️ S2UNO节点`[]📦 其他节点


custom_proxy_group=🌍 国外媒体`select`[]🎯 全球直连`[]🚀 节点选择`[]♻️ 自动选择`[]🍀 Lucky节点`[]🛰️ S2UNO节点`[]📦 其他节点

