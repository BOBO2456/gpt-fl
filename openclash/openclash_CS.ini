# OpenClash 分流模板（20260322）
# naming:
#   地区标签前缀：US / EU / ASIA（支持 - 和 _）
#   功能标签包含：openai / teshu / tongxun（大小写不敏感）

[custom]
; ===== 策略组 =====

# 🚀 主策略：全局默认出口
custom_proxy_group=🚀 主策略`select`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]DIRECT`[]✨ 特殊节点

# ⚡ 自动测速：所有节点自动测速
custom_proxy_group=⚡ 自动测速`url-test`.*`http://www.gstatic.com/generate_204`300,30,30

# 🤖 OpenAI：仅 OpenAI（ChatGPT / API）
custom_proxy_group=🤖 OpenAI`select`[]🧬 OpenAI节点`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]📡 通讯节点`[]DIRECT`[]✨ 特殊节点

# 🧠 AI服务：除 OpenAI 外的 AI 服务
custom_proxy_group=🧠 AI服务`select`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]DIRECT`[]✨ 特殊节点

# 🪟 微软服务：Bing / Copilot / Outlook / OneDrive / Teams 等
custom_proxy_group=🪟 微软服务`select`[]🚀 主策略`[]DIRECT`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]✨ 特殊节点

# 🌐 Google：Google 搜索 / Gmail / Drive / Maps / Play 等
custom_proxy_group=🌐 Google`select`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]DIRECT`[]✨ 特殊节点

# ☁️ Cloudflare：Cloudflare / X 等较挑代理的网站
custom_proxy_group=☁️ Cloudflare`select`[]🗽 美区节点`[]🚀 主策略`[]⚡ 自动测速`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]DIRECT`[]✨ 特殊节点

# 📨 即时通讯：Telegram / WhatsApp / Signal / Discord
custom_proxy_group=📨 即时通讯`select`[]📡 通讯节点`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]DIRECT`[]✨ 特殊节点

# 🎬 流媒体：Netflix / Disney+ / YouTube 等
custom_proxy_group=🎬 流媒体`select`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]DIRECT`[]✨ 特殊节点

# 🍎 苹果服务：默认直连，需要时可切代理
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]✨ 特殊节点

# 🏙️ 香港服务：香港金融和常用网站，默认直连
custom_proxy_group=🏙️ 香港服务`select`[]DIRECT`[]🌸 亚洲节点`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]✨ 特殊节点

# 🏠 国内服务：国内站点直连
custom_proxy_group=🏠 国内服务`select`[]DIRECT`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]✨ 特殊节点

# 🌍 直连策略：GEOIP,CN 兜底直连
custom_proxy_group=🌍 直连策略`select`[]DIRECT`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]✨ 特殊节点

# 🧩 默认兜底：所有未匹配流量最终走这里
custom_proxy_group=🧩 默认兜底`select`[]🚀 主策略`[]⚡ 自动测速`[]🗽 美区节点`[]🌸 亚洲节点`[]🏰 欧洲节点`[]🧬 OpenAI节点`[]📡 通讯节点`[]DIRECT`[]✨ 特殊节点


; ===== 节点池 =====

# 🗽 美区节点：名称前缀 US- 或 US_，大小写不敏感
custom_proxy_group=🗽 美区节点`url-test`(^[Uu][Ss][-_])`http://www.gstatic.com/generate_204`300,,50

# 🌸 亚洲节点：名称前缀 ASIA- 或 ASIA_，大小写不敏感
custom_proxy_group=🌸 亚洲节点`url-test`(^[Aa][Ss][Ii][Aa][-_])`http://www.gstatic.com/generate_204`300,,50

# 🏰 欧洲节点：名称前缀 EU- 或 EU_，大小写不敏感
custom_proxy_group=🏰 欧洲节点`url-test`(^[Ee][Uu][-_])`http://www.gstatic.com/generate_204`300,,50

# 🧬 OpenAI节点：名称包含 openai，大小写不敏感
custom_proxy_group=🧬 OpenAI节点`fallback`([Oo][Pp][Ee][Nn][Aa][Ii])`http://www.gstatic.com/generate_204`300,,50

# 📡 通讯节点：名称包含 tongxun，大小写不敏感
custom_proxy_group=📡 通讯节点`fallback`([Tt][Oo][Nn][Gg][Xx][Uu][Nn])`http://www.gstatic.com/generate_204`300,,50

# ✨ 特殊节点：名称包含 teshu，大小写不敏感
custom_proxy_group=✨ 特殊节点`fallback`([Tt][Ee][Ss][Hh][Uu])`http://www.gstatic.com/generate_204`300,,50


; ===== 规则（按优先级从上到下） =====

; --- OpenAI：自建精准规则 ---
ruleset=🤖 OpenAI,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/openai.list

; --- AI服务：自建规则 ---
ruleset=🧠 AI服务,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/ai.list

; --- 微软服务：ACL4SSR 稳定规则 ---
ruleset=🪟 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list

; --- Google：自建规则 ---
ruleset=🌐 Google,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/google.list

; --- ☁️ Cloudflare：自建规则 ---
ruleset=☁️ Cloudflare,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/cloudflare.list

; --- 即时通讯：自建规则 ---
ruleset=📨 即时通讯,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/im.list

; --- 流媒体：ACL4SSR 稳定规则 ---
ruleset=🎬 流媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list

; --- 苹果服务：ACL4SSR 稳定规则 ---
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list

; --- 香港服务：自建规则 ---
ruleset=🏙️ 香港服务,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/hk.list

; --- 国内服务：ACL4SSR 稳定规则 ---
ruleset=🏠 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🏠 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list
ruleset=🏠 国内服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list

; --- 中国兜底直连 ---
ruleset=🌍 直连策略,[]GEOIP,CN

; --- 最终兜底 ---
ruleset=🧩 默认兜底,[]FINAL


; ===== 基础设置 =====
enable_rule_generator=true
overwrite_original_rules=true
