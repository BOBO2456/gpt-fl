[custom]
;==================================================
; ACL4SSR 自定义模板
; 功能：
; 1. 自动选择 = 全部节点里自动选最快
; 2. Lucky / S2 = 各自前缀集合内自动选最快
; 3. 其他 = 空占位组（当前按你的节点命名预期应为空）
; 4. 节点选择、国外媒体、电报信息、微软服务、苹果服务、OpenAI、漏网之鱼
;    都提供 节点选择 入口
;==================================================

;------------------------------
; 规则集
;------------------------------
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/LocalAreaNetwork.list
ruleset=🛑 全球拦截,rules/ACL4SSR/Clash/BanAD.list
ruleset=🍃 应用净化,rules/ACL4SSR/Clash/BanProgramAD.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/GoogleCN.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/Ruleset/SteamCN.list
ruleset=🤖 OpenAI,rules/ACL4SSR/Clash/Ruleset/OpenAi.list
ruleset=Ⓜ️ 微软服务,rules/ACL4SSR/Clash/Microsoft.list
ruleset=🍎 苹果服务,rules/ACL4SSR/Clash/Apple.list
ruleset=🌍 国外媒体,rules/ACL4SSR/Clash/ProxyMedia.list
ruleset=📲 电报信息,rules/ACL4SSR/Clash/Telegram.list
ruleset=🚀 节点选择,rules/ACL4SSR/Clash/ProxyLite.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/ChinaDomain.list
ruleset=🎯 全球直连,rules/ACL4SSR/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

;------------------------------
; 自动选择：全部节点中自动选最快
;------------------------------
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

;------------------------------
; 前缀集合：组内自动选最快
;------------------------------
custom_proxy_group=🍀 Lucky`url-test`(?i)^lucky.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🛰️ S2`url-test`(?i)^s2.*`http://www.gstatic.com/generate_204`300,,50

;------------------------------
; 其他：当前按预期保持为空
; 用一个不可能匹配到节点名的正则
;------------------------------
custom_proxy_group=📦 其他`url-test`a^`http://www.gstatic.com/generate_204`300,,50

;------------------------------
; 业务分组
;------------------------------
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`[]🍀 Lucky`[]🛰️ S2`[]📦 其他

custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]♻️ 自动选择`[]🍀 Lucky`[]🛰️ S2`[]📦 其他`[]🎯 全球直连
custom_proxy_group=📲 电报信息`select`[]🚀 节点选择`[]♻️ 自动选择`[]🍀 Lucky`[]🛰️ S2`[]📦 其他`[]🎯 全球直连
custom_proxy_group=Ⓜ️ 微软服务`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`[]🍀 Lucky`[]🛰️ S2`[]📦 其他
custom_proxy_group=🍎 苹果服务`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`[]🍀 Lucky`[]🛰️ S2`[]📦 其他
custom_proxy_group=🤖 OpenAI`select`[]🚀 节点选择`[]♻️ 自动选择`[]🍀 Lucky`[]🛰️ S2`[]📦 其他`[]🎯 全球直连

custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]🍀 Lucky`[]🛰️ S2`[]📦 其他`[]🎯 全球直连

enable_rule_generator=true
overwrite_original_rules=true
