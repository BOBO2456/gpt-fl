ruleset=🐟 漏网之鱼,[]FINAL

;==================================================
; 策略组（主策略）
;==================================================

custom_proxy_group=🚀 节点策略`select`[]⚡ 自动测速`[]DIRECT`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点

custom_proxy_group=🌍 国外媒体`select`[]🚀 节点策略`[]⚡ 自动测速`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点`[]🎯 全球直连
custom_proxy_group=📲 电报信息`select`[]🚀 节点策略`[]⚡ 自动测速`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点`[]🎯 全球直连
custom_proxy_group=🤖 OpenAI`select`[]🚀 节点策略`[]⚡ 自动测速`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点`[]🎯 全球直连
custom_proxy_group=🧠 AI服务`select`[]🚀 节点策略`[]⚡ 自动测速`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点`[]🎯 全球直连

custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 节点策略`[]⚡ 自动测速`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 节点策略`[]⚡ 自动测速`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点

custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点策略
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点策略`[]⚡ 自动测速`[]☁️ CF节点`[]🛰️ S2节点`[]📦 其他节点`[]🎯 全球直连

;==================================================
; 节点测速组（底部）
;==================================================

custom_proxy_group=⚡ 自动测速`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=☁️ CF节点`url-test`(?i)^lucky.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🛰️ S2节点`url-test`(?i)^s2.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=📦 其他节点`url-test`a^`http://www.gstatic.com/generate_204`300,,50

enable_rule_generator=true
overwrite_original_rules=true
