# OpenClash 分流模板（最终稳定版）

[custom]
; ===== 策略组 =====

custom_proxy_group=🚀 默认策略`select`[]⚡ 自动测速`[]☁️ CF节点`[]S2节点`[]DIRECT
custom_proxy_group=⚡ 自动测速`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=☁️ CF节点`select`(^CF|^cf)
custom_proxy_group=S2节点`select`(^S2|^s2)

custom_proxy_group=🤖 OpenAI`select`[]🚀 默认策略`[]⚡ 自动测速`[]☁️ CF节点`[]S2节点
custom_proxy_group=🧠 AI服务`select`[]🚀 默认策略`[]⚡ 自动测速`[]☁️ CF节点`[]S2节点
custom_proxy_group=🪟 微软服务`select`[]🚀 默认策略`[]DIRECT`[]⚡ 自动测速
custom_proxy_group=🌐 Google服务`select`[]🚀 默认策略`[]⚡ 自动测速
custom_proxy_group=📨 即时通讯`select`[]🚀 默认策略`[]⚡ 自动测速
custom_proxy_group=📺 流媒体`select`[]🚀 默认策略`[]⚡ 自动测速
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 默认策略`[]⚡ 自动测速
custom_proxy_group=🇨🇳 国内服务`select`[]DIRECT`[]🚀 默认策略
custom_proxy_group=🌍 全球直连`select`[]DIRECT`[]🚀 默认策略
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 默认策略`[]DIRECT

; ===== 规则（严格按优先级） =====

; --- OpenAI ---
ruleset=🤖 OpenAI,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/openai.list

; --- AI服务（非 OpenAI）---
ruleset=🧠 AI服务,https://raw.githubusercontent.com/BOBO2456/gpt-fl/main/rules/ai.list

; --- 微软 ---
ruleset=🪟 微软服务,https://ruleset.skk.moe/Clash/microsoft.list

; --- Google ---
ruleset=🌐 Google服务,https://ruleset.skk.moe/Clash/google.list

; --- 即时通讯 ---
ruleset=📨 即时通讯,https://ruleset.skk.moe/Clash/telegram.list

; --- 流媒体 ---
ruleset=📺 流媒体,https://ruleset.skk.moe/Clash/streaming.list

; --- 苹果 ---
ruleset=🍎 苹果服务,https://ruleset.skk.moe/Clash/apple-cn.list

; --- 国内 ---
ruleset=🇨🇳 国内服务,https://ruleset.skk.moe/Clash/cn_domain.list
ruleset=🇨🇳 国内服务,https://ruleset.skk.moe/Clash/cn_ip.list

; --- 中国直连 ---
ruleset=🌍 全球直连,[]GEOIP,CN

; --- 最终 ---
ruleset=🐟 漏网之鱼,[]FINAL

; ===== 基础设置 =====
enable_rule_generator=true
overwrite_original_rules=true
