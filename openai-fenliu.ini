;==================================================
; 节点测速组（移动到底部）
;==================================================

custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🍀 Lucky节点`url-test`(?i)^lucky.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🛰️ S2UNO节点`url-test`(?i)^s2.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=📦 其他节点`url-test`a^`http://www.gstatic.com/generate_204`300,,50


enable_rule_generator=true
overwrite_original_rules=true
